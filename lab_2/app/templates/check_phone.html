{% extends 'base.html' %}

{% block content %}
<h1 class="mt-5 text-center">Проверка телефона</h1>

<form method="post" action="{{ url_for('check_phone') }}" class="mt-4" novalidate>
  <div class="mb-3">
    <label for="phone" class="form-label">Телефон</label>
    <input type="text" class="form-control {% if error %}is-invalid{% endif %}" id="phone" name="phone" value="{{ phone or '' }}">
    {% if error %}
    <div class="invalid-feedback d-block">{{ error }}</div>
    {% endif %}
  </div>
  <button type="submit" class="btn btn-primary">Проверить</button>
</form>

{% if formatted %}
<h2 class="mt-5">Номер: {{ formatted }}</h2>
{% endif %}
{% endblock %}
